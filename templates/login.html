<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Zone | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1 class="cafe-title" style="color: brown;"><img src="/static/images/cafelogo.jpeg" alt="Cafe Logo" class="cafe-logo">HangOut Cafe</h1>

    <main class="login-main animation-container" id="mainContainer">
        
        <div id="formWrapper">
            
            <div class="form-panel login-panel">
                <div class="form-container login-form">
                    <h2>Login</h2>
                    <form onsubmit="return loginUser(event)">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>

                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>

                        <button type="submit" class="login-button green-btn">Login</button>

                        <p class="register-link-text">Don’t have an account? <a href="#" onclick="showRegisterPanel()" class="brown-link">Register Here</a></p>
                    </form>
                </div>
            </div>

            <div class="form-panel register-panel">
                <div class="form-container login-form">
                    <h2 class="only-register-title"> Register</h2>
                    <form onsubmit="return registerUser(event)">
                        <input type="text" id="regName" placeholder="Full Name" required>
                        <input type="email" id="regEmail" placeholder="Email ID" required>
                        <input type="text" id="regMobile" placeholder="Mobile Number" required>
                        <input type="password" id="regPassword" placeholder="Password" required>

                        <p class="register-link-text">Already have an account? <a href="#" onclick="showLoginPanel()" class="brown-link">Login Here</a></p>
                    </form>
                </div>
            </div>

        </div>
    </main>



    <!-- Welcome Popup -->
    <div id="welcomePopup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <h2>Welcome, <span id="userName"></span>!</h2>
            <p>Thank you for logging in to HangOut Cafe.</p>
            <button id="continueBtn" class="popup-btn">Continue</button>
        </div>
    </div>

    <!-- Diet Selection Popup -->
    <div id="dietPopup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <h2>Choose Your Meal Preference</h2>
            <p>Select your preferred meal type:</p>
            <div class="popup-buttons">
                <button id="dietBtn" class="popup-btn diet-btn">Diet</button>
                <button id="nonDietBtn" class="popup-btn non-diet-btn">Non-Diet</button>
                <button id="cancelBtn" class="popup-btn cancel-btn">Cancel</button>
            </div>
        </div>
    </div>



    <script src="/static/script.js"></script>
</body>
</html>
