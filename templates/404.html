<!DOCTYPE html>
<html>
<head>
    <title>Page Not Found</title>
    <style>
        body{
            font-family: Arial;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f6f8;
        }
        .box{
            text-align:center;
        }
        h1{
            font-size:90px;
            margin:0;
            color:#ff4757;
        }
        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#3498db;
            color:white;
            text-decoration:none;
            border-radius:6px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist.</p>

    <a href="/">Go Home</a>
</div>

</body>
</html>
